<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evanesco — Ephemeral Messenger</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0f;color:#c0c0d0;font-family:'SF Mono','Courier New',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .c{max-width:600px;text-align:center;padding:40px 20px}
        h1{font-size:48px;color:#8b5cf6;letter-spacing:12px;margin-bottom:8px}
        .sub{color:#555;font-size:14px;margin-bottom:40px}
        .desc{color:#888;font-size:14px;line-height:1.6;margin-bottom:30px}
        .feat{display:inline-block;background:#12121a;border:1px solid #2a2a3a;padding:8px 16px;border-radius:6px;margin:4px;font-size:12px}
        .btn{display:inline-block;background:#8b5cf6;color:#fff;padding:14px 30px;border-radius:8px;text-decoration:none;font-weight:bold;margin:20px 10px;letter-spacing:2px}
        .btn.gh{background:#1e1e2e;color:#8b5cf6;border:1px solid #2a2a3a}
        .ver{color:#444;font-size:11px;margin-top:30px}
    </style>
</head>
<body>
    <div class="c">
        <h1>EVANESCO</h1>
        <p class="sub">Say it. Then forget.</p>
        <div class="desc">P2P Encrypted Messenger. No servers. No logs. No trace.</div>
        <span class="feat">Tor P2P</span>
        <span class="feat">E2E Encryption</span>
        <span class="feat">Self-destruct</span>
        <span class="feat">Dark/Light Theme</span>
        <span class="feat">Multilang</span>
        <span class="feat">File Sharing</span>
        <br><br>
        <a href="https://github.com/whitelifeman/Evanesco" class="btn gh">GitHub</a>
        <p class="ver">v0.7 · By Future Integra</p>
    </div>
</body>
</html>
